<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨时代峰峻一到四代 · 缘分测试✨</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- 背景装饰 (保留氛围感) -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="main-card">
    <header class="card-header fade-in" style="--delay: 0.1s">
      <h1>TF 家族<br><span class="highlight">缘分测试</span></h1>
      <p class="subtitle">你和哪位爱豆更有缘分？</p>
      <div class="author-sign">By Akihi9<br>小红书@9056000390</div>
    </header>

    <form id="testForm">
      <!-- 1. 昵称输入 -->
      <div class="input-group fade-in" style="--delay: 0.2s">
        <label for="nickname">你的昵称</label>
        <div class="input-wrapper">
          <input type="text" id="nickname" placeholder="请输入你的名字..." autocomplete="off">
          <span class="input-icon">✨</span>
        </div>
      </div>

      <!-- 2. 星座选择 (恢复下拉框) -->
      <div class="input-group fade-in" style="--delay: 0.3s">
        <label for="star">你的星座</label>
        <select id="star">
          <option value="" disabled selected>请选择星座</option>
          <option value="aries">白羊座 ♈</option>
          <option value="taurus">金牛座 ♉</option>
          <option value="gemini">双子座 ♊</option>
          <option value="cancer">巨蟹座 ♋</option>
          <option value="leo">狮子座 ♌</option>
          <option value="virgo">处女座 ♍</option>
          <option value="libra">天秤座 ♎</option>
          <option value="scorpio">天蝎座 ♏</option>
          <option value="sagittarius">射手座 ♐</option>
          <option value="capricorn">摩羯座 ♑</option>
          <option value="aquarius">水瓶座 ♒</option>
          <option value="pisces">双鱼座 ♓</option>
        </select>
      </div>

      <!-- 3. MBTI 选择 (恢复下拉框) -->
      <div class="input-group fade-in" style="--delay: 0.4s">
        <label for="mbti">你的 MBTI</label>
        <select id="mbti">
          <option value="" disabled selected>请选择人格类型</option>
          <option value="INFJ">INFJ 提倡者</option>
          <option value="INFP">INFP 调停者</option>
          <option value="INTJ">INTJ 建筑师</option>
          <option value="INTP">INTP 逻辑学家</option>
          <option value="ISFJ">ISFJ 守卫者</option>
          <option value="ISFP">ISFP 探险家</option>
          <option value="ISTJ">ISTJ 物流师</option>
          <option value="ISTP">ISTP 鉴赏家</option>
          <option value="ENFJ">ENFJ 主人公</option>
          <option value="ENFP">ENFP 竞选者</option>
          <option value="ENTJ">ENTJ 指挥官</option>
          <option value="ENTP">ENTP 辩论家</option>
          <option value="ESFJ">ESFJ 执政官</option>
          <option value="ESFP">ESFP 表演者</option>
          <option value="ESTJ">ESTJ 总经理</option>
          <option value="ESTP">ESTP 企业家</option>
        </select>
      </div>

      <!-- 4. 代际选择 (恢复下拉框) -->
      <div class="input-group fade-in" style="--delay: 0.5s">
        <label for="group">更喜欢哪一代？</label>
        <select id="group">
          <option value="all">都可以 / 随机</option>
          <option value="tfboys">TFBOYS (一代)</option>
          <option value="时代少年团">时代少年团 (二代)</option>
          <option value="三代">TF家族三代</option>
          <option value="四代">TF家族四代</option>
        </select>
      </div>

      <!-- 提示语 -->
      <div class="tip-box fade-in" style="--delay: 0.6s">
        <span class="tip-icon">💡</span>
        <p>结合星座、MBTI 及爱豆八字权重匹配，仅供娱乐~</p>
      </div>

      <!-- 按钮 -->
      <button type="button" id="startBtn" class="fade-in" style="--delay: 0.7s">
        开始测试 <span class="btn-arrow">→</span>
      </button>
    </form>
  </div>

  <script>
    // 简单的开始按钮逻辑
    document.getElementById("startBtn").addEventListener("click", function() {
      const nickname = document.getElementById("nickname").value.trim();
      const star = document.getElementById("star").value;
      const mbti = document.getElementById("mbti").value;
      const group = document.getElementById("group").value;

      // 验证
      if (!nickname) {
        const input = document.getElementById("nickname");
        input.classList.add('shake');
        input.placeholder = "请先告诉我你的名字~";
        setTimeout(() => {
          input.classList.remove('shake');
          input.placeholder = "请输入你的名字...";
        }, 500);
        return;
      }
      if (!star) {
        alert("别忘了选星座哦！");
        document.getElementById("star").focus();
        return;
      }
      if (!mbti) {
        alert("MBTI 是匹配的关键，选一个吧！");
        document.getElementById("mbti").focus();
        return;
      }

      // 存储
      localStorage.setItem("nickname", nickname);
      localStorage.setItem("star", star);
      localStorage.setItem("mbti", mbti);
      localStorage.setItem("group", group);

      // 按钮点击特效
      const btn = this;
      const originalText = btn.innerHTML;
      btn.innerHTML = "加载中...";
      btn.style.transform = "scale(0.95)";
      
      setTimeout(() => {
        window.location.href = "question1.html";
      }, 600);
    });

    // 入场动画
    window.addEventListener('load', () => {
      document.querySelectorAll('.fade-in').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      });
    });
  </script>
</body>
</html>
